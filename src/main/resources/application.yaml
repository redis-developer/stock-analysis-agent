spring:
  application:
    name: stock-analysis-agent
  web:
    resources:
      cache:
        cachecontrol:
          no-store: true
          no-cache: true
          must-revalidate: true
  mvc:
    async:
      request-timeout: ${SPRING_MVC_ASYNC_REQUEST_TIMEOUT:10m}
  cache:
    type: ${SPRING_CACHE_TYPE:redis}
  data:
    redis:
      host: ${STOCK_ANALYSIS_AGENT_REDIS_HOST:localhost}
      port: ${STOCK_ANALYSIS_AGENT_REDIS_PORT:6379}
      username: ${STOCK_ANALYSIS_AGENT_REDIS_USERNAME:}
      password: ${STOCK_ANALYSIS_AGENT_REDIS_PASSWORD:}
  session:
    redis:
      namespace: stock-analysis:session
    timeout: 30m
  ai:
    openai:
      api-key: ${STOCK_ANALYSIS_AGENT_OPENAI_API_KEY:${OPENAI_API_KEY:${SPRING_AI_OPENAI_API_KEY:}}}
      chat:
        options:
          model: gpt-4o
      embedding:
        options:
          model: text-embedding-3-small
    model:
      chat: openai
      embedding: openai
      image: none
      moderation: none
      audio:
        speech: none
        transcription: none
        
stock-analysis:
  workflow:
    lease: ${STOCK_ANALYSIS_WORKFLOW_LEASE:15s}
    lease-renewal-interval: ${STOCK_ANALYSIS_WORKFLOW_LEASE_RENEWAL_INTERVAL:5s}
    recovery:
      scan-delay-ms: ${STOCK_ANALYSIS_WORKFLOW_RECOVERY_SCAN_DELAY_MS:5000}
      initial-delay-ms: ${STOCK_ANALYSIS_WORKFLOW_RECOVERY_INITIAL_DELAY_MS:5000}
  circuit-breaker:
    enabled: ${STOCK_ANALYSIS_CIRCUIT_BREAKER_ENABLED:true}
    failure-threshold: ${STOCK_ANALYSIS_CIRCUIT_BREAKER_FAILURE_THRESHOLD:3}
    open-duration: ${STOCK_ANALYSIS_CIRCUIT_BREAKER_OPEN_DURATION:30s}
    probe-timeout: ${STOCK_ANALYSIS_CIRCUIT_BREAKER_PROBE_TIMEOUT:10s}
    state-ttl: ${STOCK_ANALYSIS_CIRCUIT_BREAKER_STATE_TTL:7d}
  provider-capacity:
    enabled: ${STOCK_ANALYSIS_PROVIDER_CAPACITY_ENABLED:true}
    default-limit: ${STOCK_ANALYSIS_PROVIDER_CAPACITY_DEFAULT_LIMIT:2}
    permit-ttl: ${STOCK_ANALYSIS_PROVIDER_CAPACITY_PERMIT_TTL:40s}
    wait-timeout: ${STOCK_ANALYSIS_PROVIDER_CAPACITY_WAIT_TIMEOUT:40s}
    retry-interval: ${STOCK_ANALYSIS_PROVIDER_CAPACITY_RETRY_INTERVAL:100ms}
    state-ttl: ${STOCK_ANALYSIS_PROVIDER_CAPACITY_STATE_TTL:7d}
  provider-latency-simulation:
    default-delay: ${STOCK_ANALYSIS_PROVIDER_SIMULATED_DELAY:40s}
  market-data:
    provider: twelve-data
    twelve-data:
      base-url: https://api.twelvedata.com
      api-key: ${STOCK_ANALYSIS_AGENT_TWELVE_DATA_API_KEY:${TWELVE_DATA_API_KEY:}}
  fundamentals:
    provider: sec
  news:
    provider: sec
    tavily:
      base-url: https://api.tavily.com
      api-key: ${STOCK_ANALYSIS_AGENT_TAVILY_API_KEY:${TAVILY_API_KEY:}}
      max-results: 5
  technical-analysis:
    provider: twelve-data
    interval: 1day
    output-size: 60
    sma-period: 20
    ema-period: 20
    rsi-period: 14
  historical-candles:
    provider: twelve-data
    interval: 1day
    adjustment: all
  sec:
    data-base-url: https://data.sec.gov
    ticker-file-url: https://www.sec.gov/files/company_tickers.json
    user-agent: ${SEC_USER_AGENT:stock-analysis-agent-workshop workshop@example.com}
  semantic-cache:
    ttl-seconds: 300
    lang-cache:
      url: ${STOCK_ANALYSIS_AGENT_LANGCACHE_ENDPOINT}
      cache-id: ${STOCK_ANALYSIS_AGENT_LANGCACHE_CACHE_ID}
      api-key: ${STOCK_ANALYSIS_AGENT_LANGCACHE_API_KEY}
      similarity-threshold: ${LANGCACHE_SIMILARITY_TH3RESHOLD:0.9}
      exact-search: ${LANGCACHE_EXACT_SEARCH:true}
      semantic-search: ${LANGCACHE_SEMANTIC_SEARCH:true}
      include-kind-attribute: ${LANGCACHE_INCLUDE_KIND_ATTRIBUTE:false}
  semantic-guardrail:
    enabled: ${SEMANTIC_GUARDRAIL_ENABLED:true}
    distance-threshold: 0.5
    name: stock-analysis-semantic-guardrail
    embedding-model-name: ${spring.ai.openai.embedding.options.model:text-embedding-3-small}
    embedding-dimensions: 1536

agent-memory:
  namespace: ${AGENT_MEMORY_NAMESPACE:stock-analysis}
  url: ${STOCK_ANALYSIS_AGENT_AGENT_MEMORY_ENDPOINT:}
  store-id: ${STOCK_ANALYSIS_AGENT_AGENT_MEMORY_STORE_ID:}
  api-key: ${STOCK_ANALYSIS_AGENT_AGENT_MEMORY_API_KEY:}
app:
  chat:
    session-management-enabled: ${CHAT_SESSION_MANAGEMENT_ENABLED:true}
  rate-limiting:
    enabled: ${RATE_LIMITING_ENABLED:true}
    requests-per-minute: ${RATE_LIMITING_REQUESTS_PER_MINUTE:6}
    refill-period: ${RATE_LIMITING_REFILL_PERIOD:1m}
    redis-key-prefix: ${RATE_LIMITING_REDIS_KEY_PREFIX:stock-analysis:rate-limit:user}
    protected-paths:
      - /api/chat
      - /api/chat/stream

server:
  port: ${PORT:8080}
