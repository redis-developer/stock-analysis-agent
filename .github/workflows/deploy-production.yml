name: Deploy production

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: production-deploy
  cancel-in-progress: true

env:
  GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  GCP_REGION: ${{ vars.GCP_REGION }}
  ARTIFACT_REGISTRY_HOST: ${{ vars.ARTIFACT_REGISTRY_HOST }}
  ARTIFACT_REGISTRY_REPOSITORY: ${{ vars.ARTIFACT_REGISTRY_REPOSITORY }}
  IMAGE_NAME: ${{ vars.IMAGE_NAME }}
  CLOUD_RUN_SERVICE: ${{ vars.CLOUD_RUN_SERVICE }}

jobs:
  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Validate required deployment configuration
        run: |
          test -n "${{ env.GCP_PROJECT_ID }}"
          test -n "${{ env.GCP_REGION }}"
          test -n "${{ env.ARTIFACT_REGISTRY_HOST }}"
          test -n "${{ env.ARTIFACT_REGISTRY_REPOSITORY }}"
          test -n "${{ env.IMAGE_NAME }}"
          test -n "${{ env.CLOUD_RUN_SERVICE }}"

      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25
          cache: gradle

      - name: Test
        run: ./gradlew test

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3

      - name: Configure Docker
        run: gcloud auth configure-docker "${{ env.ARTIFACT_REGISTRY_HOST }}" --quiet

      - name: Set image metadata
        id: image
        run: |
          echo "sha=${GITHUB_SHA}" >> "${GITHUB_OUTPUT}"
          echo "repository=${{ env.ARTIFACT_REGISTRY_HOST }}/${{ env.GCP_PROJECT_ID }}/${{ env.ARTIFACT_REGISTRY_REPOSITORY }}/${{ env.IMAGE_NAME }}" >> "${GITHUB_OUTPUT}"

      - name: Build and push image
        run: |
          docker build \
            -t "${{ steps.image.outputs.repository }}:${{ steps.image.outputs.sha }}" \
            -t "${{ steps.image.outputs.repository }}:latest" \
            .
          docker push "${{ steps.image.outputs.repository }}:${{ steps.image.outputs.sha }}"
          docker push "${{ steps.image.outputs.repository }}:latest"

      - name: Deploy
        run: |
          gcloud run deploy "${{ env.CLOUD_RUN_SERVICE }}" \
            --image "${{ steps.image.outputs.repository }}:${{ steps.image.outputs.sha }}" \
            --region "${{ env.GCP_REGION }}" \
            --project "${{ env.GCP_PROJECT_ID }}"
